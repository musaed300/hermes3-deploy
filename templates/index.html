<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Hermes 3.0</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d0d0d;color:#e0e0e0;height:100vh;overflow:hidden}.app{display:flex;height:100vh}.sidebar{width:260px;background:#161616;border-right:1px solid #2a2a2a;display:flex;flex-direction:column}.sidebar-header{padding:16px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between}.sidebar-header h1{font-size:16px;font-weight:600;color:#fff}.new-chat-btn{background:#2563eb;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}.new-chat-btn:hover{background:#1d4ed8}.chat-list{flex:1;overflow-y:auto;padding:8px}.chat-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;display:flex;flex-direction:column;gap:2px;transition:background .15s;position:relative}.chat-item:hover{background:#1f1f1f}.chat-item.active{background:#2563eb22;border:1px solid #2563eb44}.chat-item .title{font-size:13px;font-weight:500;color:#e0e0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat-item .time{font-size:11px;color:#666}.chat-item .delete-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);opacity:0;background:none;border:none;color:#888;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}.chat-item:hover .delete-btn{opacity:1}.chat-item .delete-btn:hover{color:#ff4444;background:#ff444422}.empty-sidebar{text-align:center;padding:40px 20px;color:#555;font-size:13px}.main{flex:1;display:flex;flex-direction:column}.main-header{padding:14px 24px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between}.main-header h2{font-size:15px;font-weight:500;color:#fff}.model-select{background:#1f1f1f;color:#e0e0e0;border:1px solid #333;padding:5px 10px;border-radius:6px;font-size:12px;outline:none}.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}.message{max-width:80%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word;animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.message.user{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:4px}.message.assistant{align-self:flex-start;background:#1f1f1f;color:#e0e0e0;border:1px solid #2a2a2a;border-bottom-left-radius:4px}.message.assistant pre{background:#0d0d0d;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:13px}.message.assistant code{background:#0d0d0d;padding:2px 6px;border-radius:4px;font-size:13px;font-family:monospace}.input-area{padding:16px 24px;border-top:1px solid #2a2a2a}.input-box{display:flex;gap:12px;align-items:flex-end;background:#1f1f1f;border:1px solid #333;border-radius:12px;padding:10px 14px}.input-box textarea{flex:1;background:transparent;border:none;color:#e0e0e0;font-size:14px;resize:none;outline:none;max-height:120px;font-family:inherit;line-height:1.5}.input-box textarea::placeholder{color:#555}.send-btn{background:#2563eb;color:#fff;border:none;width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}.send-btn:hover:not(:disabled){background:#1d4ed8}.send-btn:disabled{opacity:.4;cursor:not-allowed}.send-btn svg{width:18px;height:18px}.status-bar{padding:6px 24px;font-size:12px;color:#555;border-top:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}.status-bar .error{color:#ff4444}.typing-indicator{display:flex;gap:4px;padding:12px 16px}.typing-indicator span{width:8px;height:8px;background:#555;border-radius:50%;animation:bounce 1.4s infinite ease-in-out}.typing-indicator span:nth-child(2){animation-delay:.2s}.typing-indicator span:nth-child(3){animation-delay:.4s}@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#555;gap:16px}.empty-state h3{font-size:20px;font-weight:500;color:#888}.empty-state p{font-size:14px;max-width:400px;text-align:center;line-height:1.6}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}</style></head><body><div class="app"><div class="sidebar"><div class="sidebar-header"><h1>Hermes 3.0</h1><button class="new-chat-btn" onclick="createNewChat()">+ New</button></div><div class="chat-list" id="chatList"><div class="empty-sidebar">No chats yet</div></div></div><div class="main"><div class="main-header"><h2 id="chatTitle">New Chat</h2><select class="model-select" id="modelSelect"><option value="moonshotai/kimi-k2.7-code">Kimi K2.7 Code</option><option value="openai/gpt-4o">GPT-4o</option><option value="anthropic/claude-sonnet-4-20250514">Claude Sonnet 4</option><option value="deepseek/deepseek-chat">DeepSeek V3</option><option value="google/gemini-2.5-pro">Gemini 2.5 Pro</option></select></div><div class="messages" id="messages"><div class="empty-state"><h3>Welcome to Hermes 3.0</h3><p>Start a new conversation. Your messages are saved automatically.</p></div></div><div class="input-area"><div class="input-box"><textarea id="msgInput" rows="1" placeholder="Type a message..." onkeydown="handleKeydown(event)"></textarea><button class="send-btn" id="sendBtn" onclick="sendMessage()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg></button></div></div><div class="status-bar"><span id="statusText">Ready</span><span>v3.0.3</span></div></div></div><script>const API=window.location.origin;let currentChatId=localStorage.getItem("hcid")||"";let isLoading=false;document.addEventListener("DOMContentLoaded",()=>{loadChats();if(currentChatId)loadChat(currentChatId)});async function loadChats(){try{const r=await fetch(API+"/chats");const d=await r.json();renderChatList(d.chats||[])}catch(e){setStatus("Load failed",true)}}function renderChatList(chats){const l=document.getElementById("chatList");if(!chats.length){l.innerHTML='<div class="empty-sidebar">No chats yet</div>';return}l.innerHTML=chats.map(c=>'<div class="chat-item '+(c.id===currentChatId?"active":"")+'" onclick="selectChat(\''+c.id+'\')"><span class="title">'+esc(c.title||"Untitled")+'</span><span class="time">'+fmt(c.updated_at)+'</span><button class="delete-btn" onclick="event.stopPropagation();delChat(\''+c.id+'\')">&times;</button></div>').join("")}async function selectChat(id){currentChatId=id;localStorage.setItem("hcid",id);await loadChat(id);await loadChats()}async function loadChat(id){try{const r=await fetch(API+"/chats/"+id);if(!r.ok){localStorage.removeItem("hcid");currentChatId="";loadChats();return}const d=await r.json();document.getElementById("chatTitle").textContent=esc(d.chat.title||"Chat");if(d.chat.model)document.getElementById("modelSelect").value=d.chat.model;renderMsgs(d.messages||[])}catch(e){setStatus("Load failed",true)}}function renderMsgs(msgs){const b=document.getElementById("messages");if(!msgs.length){b.innerHTML='<div class="empty-state"><h3>Welcome</h3><p>Start a conversation.</p></div>';return}b.innerHTML=msgs.map(m=>'<div class="message '+m.role+'">'+(m.role==="assistant"?md(m.content):esc(m.content))+'</div>').join("");scrollB()}async function sendMessage(){const inp=document.getElementById("msgInput");const txt=inp.value.trim();if(!txt||isLoading)return;isLoading=true;inp.value="";inp.style.height="auto";document.getElementById("sendBtn").disabled=true;setStatus("Sending...");const b=document.getElementById("messages");if(b.querySelector(".empty-state"))b.innerHTML="";const u=document.createElement("div");u.className="message user";u.textContent=txt;b.appendChild(u);const t=document.createElement("div");t.className="typing-indicator";t.id="typing";t.innerHTML="<span></span><span></span><span></span>";b.appendChild(t);scrollB();try{const m=document.getElementById("modelSelect").value;const r=await fetch(API+"/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:currentChatId,message:txt,model:m})});const d=await r.json();const tp=document.getElementById("typing");if(tp)tp.remove();if(!r.ok||d.error){const e=document.createElement("div");e.className="message assistant";e.style.color="#ff4444";e.textContent="Error: "+(d.error||"Unknown");b.appendChild(e);setStatus("Error: "+(d.error||"Unknown"),true)}else{if(d.chat_id&&d.chat_id!==currentChatId){currentChatId=d.chat_id;localStorage.setItem("hcid",d.chat_id);loadChats()}const a=document.createElement("div");a.className="message assistant";a.innerHTML=md(d.reply);b.appendChild(a);setStatus("Ready",false)}}catch(e){const tp=document.getElementById("typing");if(tp)tp.remove();const er=document.createElement("div");er.className="message assistant";er.style.color="#ff4444";er.textContent="Network: "+e.message;b.appendChild(er);setStatus("Network error",true)}isLoading=false;document.getElementById("sendBtn").disabled=false;scrollB()}async function createNewChat(){currentChatId="";localStorage.removeItem("hcid");document.getElementById("chatTitle").textContent="New Chat";document.getElementById("messages").innerHTML='<div class="empty-state"><h3>New Chat</h3><p>Type your first message.</p></div>';loadChats()}async function delChat(id){if(!confirm("Delete?"))return;try{await fetch(API+"/chats/"+id,{method:"DELETE"});if(id===currentChatId){currentChatId="";localStorage.removeItem("hcid");document.getElementById("chatTitle").textContent="New Chat";document.getElementById("messages").innerHTML='<div class="empty-state"><h3>Deleted</h3><p>Start new.</p></div>'}loadChats()}catch(e){setStatus("Delete failed",true)}}function handleKeydown(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}const t=e.target;t.style.height="auto";t.style.height=Math.min(t.scrollHeight,120)+"px"}function scrollB(){const b=document.getElementById("messages");b.scrollTop=b.scrollHeight}function setStatus(t,e){const s=document.getElementById("statusText");s.textContent=t;s.className=e?"error":(t==="Ready"?"success":"")}function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML}function md(t){let h=esc(t);h=h.replace(/```(\w+)?\n([\s\S]*?)```/g,"<pre><code>$2</code></pre>");h=h.replace(/`([^`]+)`/g,"<code>$1</code>");h=h.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");h=h.replace(/\*(.+?)\*/g,"<em>$1</em>");h=h.replace(/\n/g,"<br>");return h}function fmt(ts){if(!ts)return"";const d=new Date(ts);const n=new Date();const s=(n-d)/1e3;if(s<60)return"Just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return d.toLocaleDateString()}</script></body></html>
